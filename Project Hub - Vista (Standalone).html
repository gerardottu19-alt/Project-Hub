oom==='quarter' ? 182 : 366;\n  const tasks = gTasks();\n  let min = new Date(), max = addDays(new Date(), 1);\n  for(const t of tasks){\n    const s = parseISO(t.start), e = parseISO(t.end);\n    if(s<min) min = s;\n    if(e>max) max = e;\n  }\n  const start = addDays(mondayOf(min), -7);\n  let end = addDays(max, 21);\n  if((end-start)\/86400000 < minSpan) end = addDays(start, minSpan);\n  end = addDays(mondayOf(end), 7); \/\/ snap to week boundary\n  const days = Math.round((end-start)\/86400000);\n  gRange = { start, days, dayW };\n}\nfunction dIdx(iso){ return Math.round((parseISO(iso)-gRange.start)\/86400000); }\n\nfunction renderGantt(){\n  const p = proj(gPid);\n  if(!p){ switchView('main'); return; }\n  document.getElementById('gTitle').textContent = p.name+' \u2014 Schedule';\n  document.getElementById('gDot').style.background = p.color;\n  document.getElementById('zoomWeek').classList.toggle('active', gZoom==='week');\n  document.getElementById('zoomMonth').classList.toggle('active', gZoom==='month');\n  document.getElementById('zoomQuarter').classList.toggle('active', gZoom==='quarter');\n  document.getElementById('zoomYear').classList.toggle('active', gZoom==='year');\n  computeRange();\n  const { start, days, dayW } = gRange;\n  const W = days*dayW;\n  const tasks = gTasks();\n  const chart = document.getElementById('ganttChart');\n\n  if(!tasks.length){\n    chart.innerHTML = `<div class=\"empty\" style=\"padding:70px 20px\"><span class=\"e-icon\">\ud83d\udcca<\/span>\n      No schedule tasks yet for ${escapeHtml(p.name)}.<br><br>\n      <button class=\"btn btn-primary\" id=\"gEmptyAdd\">+ Add your first task<\/button><\/div>`;\n    document.getElementById('gEmptyAdd').addEventListener('click', ()=>openTaskModal(null));\n    return;\n  }\n\n  \/* header cells *\/\n  let monthRow = '', dayRow = '';\n  let mStart = 0, curM = -1;\n  for(let i=0;i<=days;i++){\n    const d = addDays(start,i);\n    if(i===days || d.getMonth()!==curM){\n      if(curM>=0){\n        const md = addDays(start,mStart);\n        monthRow += `<div class=\"g-month-cell\" style=\"width:${(i-mStart)*dayW}px\">${MONTHS[md.getMonth()]} ${md.getFullYear()}<\/div>`;\n      }\n      curM = d.getMonth(); mStart = i;\n    }\n  }\n  for(let i=0;i<days;i++){\n    const d = addDays(start,i);\n    if(gZoom==='week'){\n      dayRow += `<div class=\"g-day-cell\" style=\"width:${dayW}px\">${d.getDate()}<\/div>`;\n    }else if(gZoom==='month'){\n      const isMon = ((d.getDay()+6)%7)===0;\n      dayRow += `<div class=\"g-day-cell\" style=\"width:${dayW}px\">${isMon?d.getDate():''}<\/div>`;\n    }else{\n      dayRow += `<div class=\"g-day-cell\" style=\"width:${dayW}px\"><\/div>`;\n    }\n  }\n\n  \/* grid: weekends, vlines, today *\/\n  let grid = '';\n  for(let i=0;i<days;i++){\n    const d = addDays(start,i);\n    const dow = (d.getDay()+6)%7;\n    if(gZoom==='week' && dow===5) grid += `<div class=\"g-weekend\" style=\"left:${i*dayW}px;width:${dayW*2}px\"><\/div>`;\n    const showLine = gZoom==='week' ? true : gZoom==='month' ? dow===0 : d.getDate()===1;\n    if(showLine) grid += `<div class=\"g-vline\" style=\"left:${i*dayW}px\"><\/div>`;\n  }\n  const tIdx = Math.round((parseISO(todayISO())-start)\/86400000);\n  if(tIdx>=0 && tIdx<=days) grid += `<div class=\"g-today\" style=\"left:${tIdx*dayW + Math.floor(dayW\/2)}px\"><\/div>`;\n\n  \/* rows *\/\n  let names = '', rows = '';\n  for(const t of tasks){\n    const si = dIdx(t.start), ei = dIdx(t.end);\n    names += `<div class=\"g-task-name\" data-tid=\"${t.id}\">\n      <span class=\"tn\">${t.ms?'\u25c6 ':''}${escapeHtml(t.name)}<\/span>\n      <span class=\"td\">${fmtDateShort(t.start)}${t.ms?'':' \u2192 '+fmtDateShort(t.end)}${t.ms?'':' \u00b7 '+(t.pct||0)+'%'}<\/span><\/div>`;\n    if(t.ms){\n      rows += `<div class=\"g-row\">\n        <div class=\"g-milestone\" data-tid=\"${t.id}\" style=\"--bc:${t.color};left:${si*dayW + Math.floor(dayW\/2) - 11}px\"><\/div>\n        <div class=\"g-ms-label\" style=\"left:${si*dayW + Math.floor(dayW\/2) + 18}px\">${escapeHtml(t.name)}<\/div>\n      <\/div>`;\n    }else{\n      const left = si*dayW+2, width = Math.max((ei-si+1)*dayW-4, dayW-4);\n      rows += `<div class=\"g-row\">\n        <div class=\"g-bar\" data-tid=\"${t.id}\" style=\"--bc:${t.color};left:${left}px;width:${width}px\">\n          <div class=\"gb-fill\" style=\"width:${Math.min(100,Math.max(0,t.pct||0))}%\"><\/div>\n          <span class=\"gb-label\">${escapeHtml(t.name)}<\/span>\n          <div class=\"gb-handle\"><\/div>\n        <\/div>\n      <\/div>`;\n    }\n  }\n\n  chart.innerHTML = `\n    <div class=\"gantt-layout\">\n      <div class=\"g-tasklist\" style=\"width:${TASKLIST_W}px\">\n        <div style=\"height:46px\" class=\"g-corner\">Tasks<\/div>\n        ${names}\n      <\/div>\n      <div class=\"gantt-scroll\" id=\"gScroll\">\n        <div class=\"gantt-inner\" style=\"width:${W}px\">\n          <div class=\"g-header-row\" style=\"background:var(--panel);border-bottom:1px solid var(--border)\">\n            <div style=\"width:${W}px\">\n              <div class=\"g-month-row\">${monthRow}<\/div>\n              <div class=\"g-day-row\">${dayRow}<\/div>\n            <\/div>\n          <\/div>\n          <div style=\"position:relative\">\n            <div class=\"g-grid\">${grid}<\/div>\n            ${rows}\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>`;\n\n  \/* scroll to today-ish on first paint *\/\n  const sc = document.getElementById('gScroll');\n  if(tIdx>0) sc.scrollLeft = Math.max(0, tIdx*dayW - sc.clientWidth*0.35);\n\n  chart.querySelectorAll('.g-task-name').forEach(el=>{\n    el.addEventListener('click', ()=>openTaskModal(el.dataset.tid));\n  });\n  chart.querySelectorAll('.g-bar, .g-milestone').forEach(el=>{\n    el.addEventListener('mousedown', e=>startDrag(e, el));\n  });\n}\n\n\/* ---- drag move \/ resize ---- *\/\nfunction startDrag(e, el){\n  e.preventDefault();\n  const tid = el.dataset.tid;\n  const t = state.gantt.find(x=>x.id===tid);\n  if(!t) return;\n  const resize = e.target.classList.contains('gb-handle') && !t.ms;\n  const startX = e.clientX;\n  const origLeft = parseFloat(el.style.left), origW = parseFloat(el.style.width)||0;\n  let deltaDays = 0, moved = false;\n  const { dayW } = gRange;\n  function onMove(ev){\n    const dx = ev.clientX-startX;\n    deltaDays = Math.round(dx\/dayW);\n    if(Math.abs(dx)>3) moved = true;\n    if(resize){\n      el.style.width = Math.max(dayW-4, origW + deltaDays*dayW)+'px';\n    }else{\n      el.style.left = (origLeft + deltaDays*dayW)+'px';\n    }\n  }\n  function onUp(){\n    document.removeEventListener('mousemove', onMove);\n    document.removeEventListener('mouseup', onUp);\n    if(!moved){ openTaskModal(tid); return; }\n    if(deltaDays!==0){\n      if(resize){\n        const ne = addDays(parseISO(t.end), deltaDays);\n        if(ne >= parseISO(t.start)) t.end = isoDate(ne);\n      }else{\n        t.start = isoDate(addDays(parseISO(t.start), deltaDays));\n        t.end   = isoDate(addDays(parseISO(t.end), deltaDays));\n      }\n      save();\n    }\n    renderGantt();\n  }\n  document.addEventListener('mousemove', onMove);\n  document.addEventListener('mouseup', onUp);\n}\n\n\/* ---- task modal ---- *\/\nfunction openTaskModal(tid){\n  const t = tid ? state.gantt.find(x=>x.id===tid) : null;\n  const p = proj(gPid);\n  const defColor = t ? t.color : (p?p.color:PALETTE[0]);\n  const today = todayISO();\n  showModal(`\n    <div class=\"modal-hd\">${t?'Edit Task':'New Task'} \u2014 ${p?escapeHtml(p.name):''}<\/div>\n    <div class=\"modal-bd\">\n      <div><label>Task Name<\/label><input type=\"text\" id=\"tmName\" value=\"${t?escapeHtml(t.name):''}\" placeholder=\"e.g. Foundation design \u2013 IFC\" style=\"width:100%\"><\/div>\n      <div class=\"field-row\">\n        <div><label>Start<\/label><input type=\"date\" id=\"tmStart\" value=\"${t?t.start:today}\" style=\"width:100%\"><\/div>\n        <div><label>End<\/label><input type=\"date\" id=\"tmEnd\" value=\"${t?t.end:isoDate(addDays(parseISO(today),5))}\" style=\"width:100%\"><\/div>\n      <\/div>\n      <div class=\"field-row\">\n        <div><label>% Complete<\/label><input type=\"number\" id=\"tmPct\" min=\"0\" max=\"100\" step=\"5\" value=\"${t?(t.pct||0):0}\" style=\"width:100%\"><\/div>\n        <div><label>Milestone<\/label><label style=\"display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text);cursor:pointer;padding-top:8px\"><input type=\"checkbox\" id=\"tmMs\" ${t&&t.ms?'checked':''} style=\"width:15px;height:15px;accent-color:var(--accent)\"> Diamond marker<\/label><\/div>\n      <\/div>\n      <div><label>Color<\/label><div class=\"color-row\" id=\"tmColors\">\n        ${PALETTE.map(c=>`<div class=\"color-swatch ${c===defColor?'sel':''}\" data-c=\"${c}\" style=\"background:${c}\"><\/div>`).join('')}\n      <\/div><\/div>\n    <\/div>\n    <div class=\"modal-ft\">\n      ${t?'<button class=\"btn btn-danger\" id=\"tmDelete\">Delete<\/button><div style=\"flex:1\"><\/div>':''}\n      <button class=\"btn btn-ghost\" id=\"tmCancel\">Cancel<\/button>\n      <button class=\"btn btn-primary\" id=\"tmSave\">${t?'Save':'Add Task'}<\/button>\n    <\/div>`);\n  let selColor = defColor;\n  document.querySelectorAll('#tmColors .color-swatch').forEach(sw=>{\n    sw.addEventListener('click', ()=>{\n      document.querySelectorAll('#tmColors .color-swatch').forEach(x=>x.classList.remove('sel'));\n      sw.classList.add('sel'); selColor = sw.dataset.c;\n    });\n  });\n  document.getElementById('tmCancel').addEventListener('click', closeModal);\n  document.getElementById('tmSave').addEventListener('click', ()=>{\n    const name = document.getElementById('tmName').value.trim();\n    let s = document.getElementById('tmStart').value, e = document.getElementById('tmEnd').value;\n    const pct = Math.min(100, Math.max(0, parseInt(document.getElementById('tmPct').value)||0));\n    const ms = document.getElementById('tmMs').checked;\n    if(!name){ toast('Enter a task name'); return; }\n    if(!s){ toast('Pick a start date'); return; }\n    if(ms) e = s;\n    if(!e || e<s){ toast('End date must be on\/after start'); return; }\n    if(t){ Object.assign(t, {name, start:s, end:e, pct, ms, color:selColor}); }\n    else state.gantt.push({ id:uid(), pid:gPid, name, start:s, end:e, pct, ms, color:selColor });\n    save(); closeModal(); renderGantt(); renderCards();\n  });\n  if(t){\n    document.getElementById('tmDelete').addEventListener('click', ()=>{\n      state.gantt = state.gantt.filter(x=>x.id!==t.id);\n      save(); closeModal(); renderGantt(); renderCards();\n    });\n  }\n  setTimeout(()=>document.getElementById('tmName').focus(), 50);\n}\n\n\/* ---- PNG export ---- *\/\nfunction exportGanttPng(){\n  const p = proj(gPid);\n  if(!gTasks().length){ toast('Add tasks before exporting'); return; }\n  if(typeof html2canvas === 'undefined'){ toast('PNG export needs an internet connection (chart library)'); return; }\n  toast('Rendering PNG\u2026');\n  html2canvas(document.getElementById('ganttFrame'), { backgroundColor:'#0b0e13', scale:2 })\n    .then(canvas=>{\n      const a = document.createElement('a');\n      a.href = canvas.toDataURL('image\/png');\n      a.download = (p?p.name.replace(\/[^\\w\\- ]\/g,''):'project')+' - schedule.png';\n      a.click();\n      toast('Schedule PNG downloaded');\n    })\n    .catch(()=>toast('Export failed \u2014 try again'));\n}\n\n\/* ===================================================================\n   SEARCH\n=================================================================== *\/\nfunction openSearch(){\n  const root = document.getElementById('searchRoot');\n  root.innerHTML = `\n    <div class=\"overlay\" id=\"sOverlay\" style=\"align-items:flex-start\">\n      <div class=\"search-box\">\n        <input type=\"text\" id=\"sInput\" placeholder=\"Search notes and action items\u2026\">\n        <div class=\"search-results\" id=\"sResults\" style=\"display:none\"><\/div>\n      <\/div>\n    <\/div>`;\n  const inp = document.getElementById('sInput');\n  inp.focus();\n  document.getElementById('sOverlay').addEventListener('mousedown', e=>{ if(e.target.id==='sOverlay') closeSearch(); });\n  inp.addEventListener('input', ()=>renderSearch(inp.value.trim().toLowerCase()));\n  inp.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSearch(); });\n}\nfunction closeSearch(){ document.getElementById('searchRoot').innerHTML=''; }\nfunction searchOpen(){ return !!document.getElementById('sOverlay'); }\nfunction renderSearch(q){\n  const box = document.getElementById('sResults');\n  if(!q || q.length<2){ box.style.display='none'; return; }\n  const hits = [];\n  for(const n of state.notes){\n    if(n.text.toLowerCase().includes(q)){\n      const p = proj(n.pid);\n      hits.push({ type:'Note', pid:n.pid, week:n.week, text:n.text, meta:`${p?p.name:''} \u00b7 week of ${fmtDateShort(n.week)}`, color:p?p.color:'#888' });\n    }\n  }\n  for(const a of state.actions){\n    if(a.text.toLowerCase().includes(q)){\n      const p = proj(a.pid);\n      hits.push({ type: a.done?'Action \u2713':'Action', pid:a.pid, week:null, text:a.text, meta:`${p?p.name:''}${a.due?' \u00b7 due '+fmtDateShort(a.due):''}`, color:p?p.color:'#888' });\n    }\n  }\n  box.style.display='block';\n  if(!hits.length){ box.innerHTML = `<div class=\"sr-item\" style=\"color:var(--faint)\">No matches for \u201c${escapeHtml(q)}\u201d<\/div>`; return; }\n  box.innerHTML = hits.slice(0,30).map((h,i)=>`\n    <div class=\"sr-item\" data-i=\"${i}\">\n      <div class=\"sr-meta\"><span class=\"ctx-dot\" style=\"background:${h.color}\"><\/span><b>${h.type}<\/b> ${escapeHtml(h.meta)}<\/div>\n      <div class=\"sr-text\">${escapeHtml(h.text.length>120?h.text.slice(0,120)+'\u2026':h.text)}<\/div>\n    <\/div>`).join('');\n  box.querySelectorAll('.sr-item').forEach(el=>{\n    el.addEventListener('click', ()=>{\n      const h = hits[parseInt(el.dataset.i)];\n      if(!h) return;\n      closeSearch();\n      if(h.week) viewWeek = parseISO(h.week);\n      switchView('main');\n      selectProject(h.pid===state.sel ? state.sel : h.pid);\n      renderAll();\n    });\n  });\n}\n\n\/* ===================================================================\n   DATA BACKUP \/ RESTORE\n=================================================================== *\/\nfunction openDataModal(){\n  showModal(`\n    <div class=\"modal-hd\">\u26ed Data \u2014 backup & restore<\/div>\n    <div class=\"modal-bd\">\n      <div style=\"color:var(--muted);font-size:13px\">\n        All data lives in this browser's local storage on this machine.\n        Export a JSON backup regularly, or to move to another computer.\n      <\/div>\n      <button class=\"btn btn-primary\" id=\"dmExport\" style=\"width:100%\">\u2b07 Export JSON backup<\/button>\n      <div>\n        <label>Restore from backup<\/label>\n        <input type=\"file\" id=\"dmImport\" accept=\".json\" style=\"width:100%;padding:7px\">\n        <div style=\"color:var(--faint);font-size:11px;margin-top:5px\">\u26a0 Importing replaces everything currently in the app.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"modal-ft\"><button class=\"btn btn-ghost\" id=\"dmClose\">Close<\/button><\/div>`);\n  document.getElementById('dmClose').addEventListener('click', closeModal);\n  document.getElementById('dmExport').addEventListener('click', ()=>{\n    downloadFile('project-hub-backup-'+todayISO()+'.json', JSON.stringify(state,null,2));\n    toast('Backup downloaded');\n  });\n  document.getElementById('dmImport').addEventListener('change', e=>{\n    const f = e.target.files[0]; if(!f) return;\n    const r = new FileReader();\n    r.onload = ()=>{\n      try{\n        const s = JSON.parse(r.result);\n        if(!Array.isArray(s.projects)) throw new Error('bad');\n        state = Object.assign(defaultState(), s);\n        state.timer = null;\n        save(); closeModal(); renderAll();\n        toast('Backup restored \u2014 '+state.projects.length+' projects loaded');\n      }catch(err){ toast('\u26a0 Not a valid Project Hub backup file'); }\n    };\n    r.readAsText(f);\n  });\n}\n\n\/* ===================================================================\n   EVENTS & INIT\n=================================================================== *\/\nfunction shiftWeek(n){ viewWeek = addDays(viewWeek, n*7); renderAll(); }\n\ndocument.getElementById('wkPrev').addEventListener('click', ()=>shiftWeek(-1));\ndocument.getElementById('wkNext').addEventListener('click', ()=>shiftWeek(1));\ndocument.getElementById('btnToday').addEventListener('click', ()=>{ viewWeek = mondayOf(new Date()); renderAll(); });\ndocument.getElementById('btnTimesheet').addEventListener('click', openTimesheet);\ndocument.getElementById('btnPrint').addEventListener('click', printReport);\ndocument.getElementById('btnSearch').addEventListener('click', openSearch);\ndocument.getElementById('btnData').addEventListener('click', openDataModal);\ndocument.getElementById('timerChip').addEventListener('click', ()=>selectProject(null));\ndocument.getElementById('noteAddBtn').addEventListener('click', addNote);\ndocument.getElementById('noteInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addNote(); });\ndocument.getElementById('aiAddBtn').addEventListener('click', addAction);\ndocument.getElementById('aiInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addAction(); });\ndocument.getElementById('tsBack').addEventListener('click', ()=>{ switchView('main'); renderAll(); });\ndocument.getElementById('tsPrev').addEventListener('click', ()=>{ tsWeek = addDays(tsWeek,-7); renderTimesheet(); });\ndocument.getElementById('tsNext').addEventListener('click', ()=>{ tsWeek = addDays(tsWeek,7); renderTimesheet(); });\ndocument.getElementById('tsCsv').addEventListener('click', exportTsCsv);\ndocument.getElementById('gBack').addEventListener('click', ()=>{ switchView('main'); renderAll(); });\ndocument.getElementById('zoomWeek').addEventListener('click', ()=>{ gZoom='week'; renderGantt(); });\ndocument.getElementById('zoomMonth').addEventListener('click', ()=>{ gZoom='month'; renderGantt(); });\ndocument.getElementById('zoomQuarter').addEventListener('click', ()=>{ gZoom='quarter'; renderGantt(); });\ndocument.getElementById('zoomYear').addEventListener('click', ()=>{ gZoom='year'; renderGantt(); });\ndocument.getElementById('gAddTask').addEventListener('click', ()=>openTaskModal(null));\ndocument.getElementById('gExport').addEventListener('click', exportGanttPng);\n\n['mousemove','keydown','mousedown','scroll','touchstart'].forEach(ev=>\n  document.addEventListener(ev, ()=>{ lastActivity = Date.now(); }, {passive:true}));\n\ndocument.addEventListener('keydown', e=>{\n  if(e.key==='Escape'){\n    if(searchOpen()){ closeSearch(); return; }\n    if(modalOpen()){ closeModal(); return; }\n    if(document.activeElement && ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){ document.activeElement.blur(); return; }\n    if(state.sel){ selectProject(null); }\n    return;\n  }\n  const typing = document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);\n  if(typing || modalOpen() || searchOpen()) return;\n  const mainVisible = !document.getElementById('view-main').classList.contains('hidden');\n  if(e.key==='\/'){ e.preventDefault(); openSearch(); return; }\n  if(!mainVisible) return;\n  if(e.key==='n' || e.key==='N'){ e.preventDefault(); document.getElementById('noteInput').focus(); }\n  if(e.key==='t' || e.key==='T'){\n    if(state.sel){ selectProject(null); toast('Timer stopped'); }\n    else toast('Select a project to start tracking');\n  }\n});\n\n\/* boot *\/\nrenderAll();\ncheckRecovery();\n<\/script>\n\n<div class=\"skin-switch\">\n  <span class=\"ss-label\">DESIGN<\/span>\n  <a href=\"project-hub-hud.html\">HUD<\/a>\n  <a href=\"project-hub-cad.html\">CAD<\/a>\n  <a href=\"project-hub-vista.html\" class=\"on\">VISTA<\/a>\n  <button id=\"bgBtn\" title=\"Upload a high-res background image\">\u26f0 BACKGROUND<\/button>\n  <input type=\"file\" id=\"bgFile\" accept=\"image\/*\" class=\"hidden\">\n<\/div>\n<script>\n(function(){\n  const KEY='projectHubBg_v1';\n  try{\n    const saved=localStorage.getItem(KEY);\n    if(saved) document.documentElement.style.setProperty('--bg-img','url(\"'+saved+'\")');\n  }catch(e){}\n  const inp=document.getElementById('bgFile');\n  document.getElementById('bgBtn').addEventListener('click',function(){inp.click();});\n  inp.addEventListener('change',function(e){\n    const f=e.target.files[0]; if(!f) return;\n    const img=new Image();\n    img.onload=function(){\n      const MAX=2880;\n      const sc=Math.min(1,MAX\/img.width);\n      const c=document.createElement('canvas');\n      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);\n      c.getContext('2d').drawImage(img,0,0,c.width,c.height);\n      const url=c.toDataURL('image\/jpeg',0.85);\n      document.documentElement.style.setProperty('--bg-img','url(\"'+url+'\")');\n      try{ localStorage.setItem(KEY,url); toast('Background updated'); }\n      catch(err){ toast('Background set for this session (image too large to save)'); }\n      URL.revokeObjectURL(img.src);\n    };\n    img.src=URL.createObjectURL(f);\n    inp.value='';\n  });\n})();\n<\/script>\n\n\n<\/body><\/html>"
  </script>
